syntax = "proto3";
package uni.v0;

message Vector {
  repeated double values = 1;
}

message ValueList {
  repeated Value values = 1;
}

message Value {
  oneof v {
    double    scalar     = 1;
    int64     int        = 2;
    bool      boolean    = 3;
    Vector    vector     = 4;
    uint32    enum_value = 5;
    ValueList list       = 6;
  }
}
message Object {
  uint64 id         = 1;
  string type_name  = 2;
  double local_time = 3;
  repeated Value values = 4;   // ORDERED per the type's FieldSpec list (§5.7)
}

message WorldState {
  string sim_version    = 1;   // determinism stamp (ADR-6)
  uint64 seed           = 2;   // determinism stamp (ADR-6)
  uint32 schema_version = 3;   // which registry version `values` are ordered against
  repeated Object objects = 4;
  // no global tick (ADR-7). A committed-frontier (GVT) field is a future add when rollback lands.
}

message Invalidate {
  double from_local_time = 1;  // "forget everything after this mark" (ADR-25); never fires in MVP
}

message ReadEvent {
  oneof e {
    WorldState state      = 1;
    Invalidate invalidate = 2;
  }
}
message ViewSpec {
  repeated string fields = 1;  // field selection; empty = all          (inert in MVP)
  uint32 max_objects     = 2;  // 0 = unlimited                          (inert in MVP)
  double fidelity        = 3;  // 0 = full                               (inert in MVP)
  // Region region       = 4;  // spatial filter, deferred (§5.6)
}
enum ValueKind {
  VALUE_KIND_UNSPECIFIED = 0;   // proto convention: 0 = "unset/unknown"
  VALUE_KIND_SCALAR      = 1;
  VALUE_KIND_INT         = 2;
  VALUE_KIND_BOOL        = 3;
  VALUE_KIND_VECTOR      = 4;
  VALUE_KIND_ENUM        = 5;
  VALUE_KIND_LIST        = 6;
}

enum Access {
  ACCESS_UNSPECIFIED = 0;
  ACCESS_READ_ONLY   = 1;
  ACCESS_READ_WRITE  = 2;
}

message FieldSpec {
  string    name     = 1;
  ValueKind kind     = 2;
  string    unit     = 3;   // schema metadata, stored once (ADR-21); "" = dimensionless
  Access    access   = 4;   // the agent gate (ADR-13)
  bool      optional = 5;   // false = dense column; true = sparse (deferred richness)
  // constraints (min/max, enum set, dim) deferred — add as a sub-message later
}

message ObjectTypeSpec {
  string type_name       = 1;
  uint32 schema_version  = 2;   // matches WorldState.schema_version — the decode key
  repeated FieldSpec fields = 3;
}


service Uni {
  // Reading
  rpc GetState (GetStateRequest) returns (WorldState);
  rpc SubscribeState (SubscribeStateRequest) returns (stream ReadEvent);

  // Control (the engine owns scheduling)
  rpc Control (Command) returns (Ack);

  // Controller path — applied at the object's current local time (ADR-26)
  rpc SetObjectParams (SetObjectParamsRequest) returns (Ack);

  // Schema introspection
  rpc ListObjectTypes (ListObjectTypesRequest) returns (ListObjectTypesResponse);
  rpc DescribeObjectType (DescribeObjectTypeRequest) returns (ObjectTypeSpec);
}

message GetStateRequest          { ViewSpec view = 1; }
message SubscribeStateRequest    { ViewSpec view = 1; }
message SetObjectParamsRequest {
  uint64 object_id = 1;
  repeated FieldValue params = 2;       // see note — oneof can't ride directly here either
}
message FieldValue   { string field = 1; Value value = 2; }   // the (field, Value) pair from §6
message DescribeObjectTypeRequest { string type_name = 1; }
message ListObjectTypesRequest    {}                          // empty, deliberately wrapped
message ListObjectTypesResponse   { repeated string type_names = 1; }
message Ack { bool ok = 1; string error = 2; }                // see note


message Command {
  oneof cmd {
    Start  start  = 1;
    Stop   stop   = 2;
    Pause  pause  = 3;
    Step   step   = 4;
    Resume resume = 5;
    Save   save   = 6;
    Load   load   = 7;
  }
}
message Start {}  message Stop {}  message Pause {}  message Resume {}  message Save {}
message Step { uint64 events = 1; }   // process N scheduler EVENTS, not ticks (ADR-2/7)
message Load { string id = 1; }